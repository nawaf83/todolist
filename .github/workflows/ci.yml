name: CI Pipeline

on:
  push:
    branches:
      - ci
      - test
      - master
  pull_request:
    branches:
      - ci
      - master

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Build project
        run: mvn clean compile

      - name: Run tests
        run: mvn test

      - name: Docker deploy
        run: docker build -t app .

      - name: Docker run
        run: docker run app
